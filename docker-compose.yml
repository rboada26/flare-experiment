name: partner-lab

networks:
  simplecnn_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  resnet_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24
  mobilenet_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.2.0/24
  gru_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
  lstm_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.1.0/24
  bilstm_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.2.0/24

services:
  simplecnn_server:
    build: ./server
    container_name: fl_simplecnn_server
    networks:
      simplecnn_network:
        ipv4_address: 172.20.0.10
    ports:
      - "8080:8080"
    environment:
      - NUM_ROUNDS=${NUM_ROUNDS:-5}

  simplecnn_client:
    build:
      context: ./clients
      dockerfile: cnn_client/Dockerfile
    container_name: fl_simplecnn_client
    networks:
      simplecnn_network:
        ipv4_address: 172.20.0.11
    environment:
      - FL_SERVER_ADDR=172.20.0.10
    depends_on:
      - simplecnn_server

  simplecnn_client2:
    build:
      context: ./clients
      dockerfile: cnn_client/Dockerfile
    container_name: fl_simplecnn_client2
    networks:
      simplecnn_network:
        ipv4_address: 172.20.0.12
    environment:
      - FL_SERVER_ADDR=172.20.0.10
    depends_on:
      - simplecnn_server

  resnet_server:
    build: ./server
    container_name: fl_resnet_server
    networks:
      resnet_network:
        ipv4_address: 172.20.1.10
    ports:
      - "8081:8080"
    environment:
      - NUM_ROUNDS=${NUM_ROUNDS:-5}

  resnet_client:
    build:
      context: ./clients
      dockerfile: resnet_client/Dockerfile
    container_name: fl_resnet_client
    networks:
      resnet_network:
        ipv4_address: 172.20.1.11
    environment:
      - FL_SERVER_ADDR=172.20.1.10
    depends_on:
      - resnet_server

  resnet_client2:
    build:
      context: ./clients
      dockerfile: resnet_client/Dockerfile
    container_name: fl_resnet_client2
    networks:
      resnet_network:
        ipv4_address: 172.20.1.12
    environment:
      - FL_SERVER_ADDR=172.20.1.10
    depends_on:
      - resnet_server

  mobilenet_server:
    build: ./server
    container_name: fl_mobilenet_server
    networks:
      mobilenet_network:
        ipv4_address: 172.20.2.10
    ports:
      - "8082:8080"
    environment:
      - NUM_ROUNDS=${NUM_ROUNDS:-5}

  mobilenet_client:
    build:
      context: ./clients
      dockerfile: mobilenet_client/Dockerfile
    container_name: fl_mobilenet_client
    networks:
      mobilenet_network:
        ipv4_address: 172.20.2.11
    environment:
      - FL_SERVER_ADDR=172.20.2.10
    depends_on:
      - mobilenet_server

  mobilenet_client2:
    build:
      context: ./clients
      dockerfile: mobilenet_client/Dockerfile
    container_name: fl_mobilenet_client2
    networks:
      mobilenet_network:
        ipv4_address: 172.20.2.12
    environment:
      - FL_SERVER_ADDR=172.20.2.10
    depends_on:
      - mobilenet_server

  gru_server:
    build: ./server
    container_name: fl_gru_server
    networks:
      gru_network:
        ipv4_address: 172.21.0.10
    ports:
      - "8083:8080"
    environment:
      - NUM_ROUNDS=${NUM_ROUNDS:-5}

  gru_client:
    build:
      context: ./clients
      dockerfile: rnn_client/Dockerfile
    container_name: fl_gru_client
    networks:
      gru_network:
        ipv4_address: 172.21.0.11
    environment:
      - FL_SERVER_ADDR=172.21.0.10
    depends_on:
