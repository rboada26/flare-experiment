      gru_network:
        ipv4_address: 172.21.0.12
    environment:
      - FL_SERVER_ADDR=172.21.0.10
    depends_on:
      - gru_server

  lstm_server:
    build: ./server
    container_name: fl_lstm_server
    networks:
      lstm_network:
        ipv4_address: 172.21.1.10
    ports:
      - "8084:8080"
    environment:
      - NUM_ROUNDS=${NUM_ROUNDS:-5}

  lstm_client:
    build:
      context: ./clients
      dockerfile: lstm_client/Dockerfile
    container_name: fl_lstm_client
    networks:
      lstm_network:
        ipv4_address: 172.21.1.11
    environment:
      - FL_SERVER_ADDR=172.21.1.10
    depends_on:
      - lstm_server

  lstm_client2:
    build:
