name: partner-lab

networks:
  simplecnn_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  resnet_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24
  mobilenet_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.2.0/24
  gru_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
  lstm_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.1.0/24
  bilstm_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.2.0/24

# ── Shared resource limits ────────────────────────────────────────────────────
x-server-resources: &server-resources
  mem_limit: 1g
  memswap_limit: 1g

x-client-resources: &client-resources
  mem_limit: 3g
  memswap_limit: 3g

services:
  simplecnn_server:
    build: ./server
    container_name: fl_simplecnn_server
    <<: *server-resources
    networks:
      simplecnn_network:
        ipv4_address: 172.20.0.10
    ports:
      - "8080:8080"
    environment:
      - NUM_ROUNDS=${NUM_ROUNDS:-5}
      - MIST_ENABLED=${MIST_ENABLED:-false}
      - MIST_P_FIXED=${MIST_P_FIXED:-262144}
      - MIST_RATE=${MIST_RATE:-10}
      - MIST_SESSION_DURATION=${MIST_SESSION_DURATION:-0}

  simplecnn_client:
    build:
      context: ./clients
      dockerfile: cnn_client/Dockerfile
    container_name: fl_simplecnn_client
    <<: *client-resources
    cpus: '2.0'
    cap_add:
      - NET_ADMIN
    networks:
      simplecnn_network:
        ipv4_address: 172.20.0.11
    environment:
      - FL_SERVER_ADDR=172.20.0.10
      - CLIENT_PROFILE=orin
      - MIST_ENABLED=${MIST_ENABLED:-false}
      - MIST_P_FIXED=${MIST_P_FIXED:-262144}
      - MIST_RATE=${MIST_RATE:-10}
      - MIST_SESSION_DURATION=${MIST_SESSION_DURATION:-0}
    depends_on:
      - simplecnn_server

  simplecnn_client2:
    build:
      context: ./clients
      dockerfile: cnn_client/Dockerfile
    container_name: fl_simplecnn_client2
    <<: *client-resources
    cpus: '4.0'
    cap_add:
      - NET_ADMIN
    networks:
      simplecnn_network:
        ipv4_address: 172.20.0.12
    environment:
      - FL_SERVER_ADDR=172.20.0.10
      - CLIENT_PROFILE=laptop
      - MIST_ENABLED=${MIST_ENABLED:-false}
      - MIST_P_FIXED=${MIST_P_FIXED:-262144}
      - MIST_RATE=${MIST_RATE:-10}
      - MIST_SESSION_DURATION=${MIST_SESSION_DURATION:-0}
    depends_on:
      - simplecnn_server

  simplecnn_client3:
    build:
      context: ./clients
      dockerfile: cnn_client/Dockerfile
